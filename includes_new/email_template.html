<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{email_title}}</title>
</head>
<body style="margin:0; padding:0; background-color:#f4f6f8; font-family:Arial, Helvetica, sans-serif;">
    <table width="100%" cellpadding="0" cellspacing="0" border="0" style="background-color:#f4f6f8; padding:20px 0;">
        <tr>
            <td align="center">
                <table width="600" cellpadding="0" cellspacing="0" border="0" style="background:#ffffff; border-radius:8px; overflow:hidden; box-shadow:0 2px 6px rgba(0,0,0,0.08); max-width: 100%;">
                    <!-- HEADER -->
                    <tr>
                        <td style="padding:20px; border-bottom:3px solid #B22222;">
                            <table width="100%">
                                <tr>
                                    <td align="left">
                                        <img src="{{logo_left}}" alt="WMSU Logo" style="height:50px; display:block;">
                                    </td>
                                    <td align="right">
                                        <img src="{{logo_right}}" alt="i-Elect Logo" style="height:50px; display:block;">
                                    </td>
                                </tr>
                            </table>
                        </td>
                    </tr>

                    <!-- TITLE -->
                    <tr>
                        <td style="padding:30px 40px 10px 40px; text-align:center;">
                            <h2 style="margin:0; color:#B22222; font-size: 24px;">{{email_title}}</h2>
                        </td>
                    </tr>

                    <!-- CONTENT -->
                    <tr>
                        <td style="padding:10px 40px 30px 40px; color:#555555; font-size:15px; line-height:1.6;">
                            <p>Dear <strong>{{voter_name}}</strong>,</p>
                            
                            <div style="margin-bottom: 20px;">
                                {{email_body}}
                            </div>

                            <p style="margin-top:30px;">
                                Best regards,<br>
                                <strong>WMSU Election Committee</strong>
                            </p>
                        </td>
                    </tr>

                    <!-- FOOTER BANNER -->
                    <tr>
                        <td>
                            <img src="{{banner_bottom}}" alt="Footer Banner" style="width:100%; height:auto; display:block;">
                        </td>
                    </tr>

                    <!-- FOOTER -->
                    <tr>
                        <td style="background-color:#333333; padding:20px; text-align:center; font-size:12px; color:#cccccc;">
                            <p style="margin:0;">Western Mindanao State University</p>
                            <p style="margin:5px 0 0 0;">This is an automated message. Please do not reply.</p>
                        </td>
                    </tr>
                </table>
            </td>
        </tr>
    </table>
</body>
</html>
